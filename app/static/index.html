<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgentNet — Find the best agent</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e0e0e0;
            min-height: 100vh;
        }

        /* Hero / Search Section */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 55vh;
            padding: 2rem;
            transition: min-height 0.4s ease;
        }

        .hero.has-results {
            min-height: auto;
            padding-top: 3rem;
            padding-bottom: 1.5rem;
        }

        .logo {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        .hero.has-results .logo { font-size: 1.8rem; }

        .tagline {
            color: #888;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }

        .hero.has-results .tagline { display: none; }

        /* Search Bar */
        .search-container {
            width: 100%;
            max-width: 640px;
            position: relative;
        }

        .search-bar {
            width: 100%;
            padding: 1rem 1.2rem;
            padding-right: 3.5rem;
            font-size: 1.1rem;
            border: 1px solid #2a2a3a;
            border-radius: 16px;
            background: #14141f;
            color: #fff;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-bar:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        .search-bar::placeholder { color: #555; }

        .search-btn {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #6366f1, #a855f7);
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.2s;
        }

        .search-btn:hover { opacity: 0.85; }
        .search-btn:disabled { opacity: 0.4; cursor: not-allowed; }

        /* Category chips */
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-top: 1.2rem;
            justify-content: center;
        }

        .hero.has-results .categories { display: none; }

        .chip {
            padding: 0.4rem 0.9rem;
            border-radius: 20px;
            border: 1px solid #2a2a3a;
            background: #14141f;
            color: #aaa;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .chip:hover, .chip.active {
            border-color: #6366f1;
            color: #c4b5fd;
            background: rgba(99, 102, 241, 0.1);
        }

        /* AI Answer */
        .ai-answer {
            max-width: 800px;
            margin: 0 auto 1.5rem;
            padding: 1.5rem 1.8rem;
            background: linear-gradient(135deg, rgba(99,102,241,0.08), rgba(168,85,247,0.08));
            border: 1px solid #2a2a3a;
            border-radius: 16px;
            color: #d4d4d4;
            font-size: 0.95rem;
            line-height: 1.7;
        }

        .ai-answer .ai-label {
            font-size: 0.75rem;
            font-weight: 600;
            color: #a78bfa;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.8rem;
        }

        .ai-answer p { margin-bottom: 0.6rem; }
        .ai-answer strong { color: #c4b5fd; }
        .ai-answer code {
            background: rgba(99,102,241,0.15);
            padding: 0.15rem 0.4rem;
            border-radius: 4px;
            font-size: 0.85rem;
            color: #e0e0e0;
        }

        .ai-cursor {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: #a78bfa;
            animation: blink 0.8s ease-in-out infinite;
            vertical-align: text-bottom;
            margin-left: 2px;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        /* Sources label */
        .sources-label {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1.5rem;
            color: #555;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.8rem;
        }

        /* Results */
        .results-section {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 1.5rem 3rem;
        }

        .results-meta {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            padding-left: 0.2rem;
        }

        .result-card {
            background: #14141f;
            border: 1px solid #1e1e2e;
            border-radius: 14px;
            padding: 1.2rem 1.4rem;
            margin-bottom: 0.8rem;
            transition: border-color 0.2s;
            cursor: default;
        }

        .result-card:hover { border-color: #333; }

        .result-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }

        .result-tool {
            font-size: 0.8rem;
            color: #6366f1;
            font-weight: 500;
        }

        .result-score {
            font-size: 0.75rem;
            padding: 0.2rem 0.6rem;
            border-radius: 8px;
            font-weight: 600;
        }

        .score-high { background: rgba(34, 197, 94, 0.15); color: #4ade80; }
        .score-mid { background: rgba(234, 179, 8, 0.15); color: #facc15; }
        .score-low { background: rgba(239, 68, 68, 0.15); color: #f87171; }

        .result-action {
            font-size: 1.05rem;
            font-weight: 600;
            color: #fff;
            margin-bottom: 0.35rem;
        }

        .result-desc {
            color: #888;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .result-meta {
            display: flex;
            gap: 0.8rem;
            margin-top: 0.7rem;
            flex-wrap: wrap;
        }

        .meta-tag {
            font-size: 0.75rem;
            padding: 0.2rem 0.55rem;
            border-radius: 6px;
            background: #1e1e2e;
            color: #777;
        }

        .meta-tag.no-mcp {
            background: rgba(239, 68, 68, 0.12);
            color: #f87171;
            font-weight: 600;
        }

        .meta-tag.has-mcp {
            background: rgba(34, 197, 94, 0.12);
            color: #4ade80;
            font-weight: 600;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 3rem;
            color: #666;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #2a2a3a;
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Empty state */
        .empty {
            text-align: center;
            padding: 3rem;
            color: #555;
        }

        .empty-icon { font-size: 2.5rem; margin-bottom: 0.8rem; }

        /* Stats bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding: 1rem;
            color: #555;
            font-size: 0.8rem;
            border-top: 1px solid #1a1a2a;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0a0a0f;
        }

        .stat-value { color: #a78bfa; font-weight: 600; }

        @media (max-width: 600px) {
            .logo { font-size: 2.2rem; }
            .search-bar { font-size: 1rem; padding: 0.85rem 1rem; padding-right: 3.2rem; }
            .stats-bar { gap: 1rem; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
    <div class="hero" id="hero">
        <div class="logo">AgentNet</div>
        <div class="tagline">Find the best agent for any task</div>

        <div class="search-container">
            <input
                type="text"
                class="search-bar"
                id="searchInput"
                placeholder="What do you want an agent to do?"
                autofocus
            />
            <button class="search-btn" id="searchBtn" onclick="search()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            </button>
        </div>

        <div class="categories" id="categories">
            <span class="chip" onclick="quickSearch('design UI mockup')">Design</span>
            <span class="chip" onclick="quickSearch('search the web')">Search</span>
            <span class="chip" onclick="quickSearch('send message')">Communication</span>
            <span class="chip" onclick="quickSearch('manage code repository')">Code</span>
            <span class="chip" onclick="quickSearch('process payment')">Payments</span>
            <span class="chip" onclick="quickSearch('query database')">Data</span>
            <span class="chip" onclick="quickSearch('book hotel')">Travel</span>
            <span class="chip" onclick="quickSearch('create issue ticket')">Project Mgmt</span>
            <span class="chip" onclick="quickSearch('deploy application')">DevOps</span>
            <span class="chip" onclick="quickSearch('send email')">Email</span>
        </div>
    </div>

    <div class="ai-answer" id="aiAnswer" style="display:none">
        <div class="ai-label">AgentNet AI</div>
        <div id="aiContent"></div>
    </div>
    <div class="sources-label" id="sourcesLabel" style="display:none">Sources</div>
    <div class="results-section" id="results"></div>

    <div class="stats-bar">
        <span><span class="stat-value" id="statTools">--</span> tools indexed</span>
        <span><span class="stat-value" id="statActions">--</span> actions</span>
        <span><span class="stat-value" id="statCategories">--</span> categories</span>
    </div>

    <script>
        const API = '';
        const input = document.getElementById('searchInput');
        const hero = document.getElementById('hero');
        const results = document.getElementById('results');
        const aiAnswer = document.getElementById('aiAnswer');
        const aiContent = document.getElementById('aiContent');
        const sourcesLabel = document.getElementById('sourcesLabel');

        // Load stats on page load
        loadStats();

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') search();
        });

        function quickSearch(query) {
            input.value = query;
            search();
        }

        async function search() {
            const query = input.value.trim();
            if (!query) return;

            hero.classList.add('has-results');
            aiAnswer.style.display = 'block';
            aiContent.innerHTML = '<span class="ai-cursor"></span>';
            sourcesLabel.style.display = 'none';
            results.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    Thinking...
                </div>
            `;

            try {
                const res = await fetch(`${API}/v1/ask/stream`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });

                if (!res.ok) throw new Error(`HTTP ${res.status}`);

                const reader = res.body.getReader();
                const decoder = new TextDecoder();
                let rawAnswer = '';
                let buffer = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        const payload = line.slice(6);
                        if (payload === '[DONE]') continue;

                        try {
                            const msg = JSON.parse(payload);
                            if (msg.type === 'token') {
                                rawAnswer += msg.content;
                                aiContent.innerHTML = renderMarkdown(rawAnswer) + '<span class="ai-cursor"></span>';
                            } else if (msg.type === 'sources') {
                                renderSources(msg.sources);
                            }
                        } catch {}
                    }
                }

                // Remove cursor when done
                aiContent.innerHTML = renderMarkdown(rawAnswer);

            } catch (err) {
                aiAnswer.style.display = 'none';
                sourcesLabel.style.display = 'none';
                results.innerHTML = `
                    <div class="empty">
                        <div class="empty-icon">!</div>
                        <div>Could not connect to AgentNet API</div>
                        <div style="font-size:0.8rem;margin-top:0.5rem;color:#444">
                            Make sure the server is running on port 8000
                        </div>
                    </div>
                `;
            }
        }

        function renderMarkdown(text) {
            return text
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>')
                .replace(/^/, '<p>').replace(/$/, '</p>');
        }

        function renderSources(sources) {
            if (!sources || sources.length === 0) {
                sourcesLabel.style.display = 'none';
                results.innerHTML = '';
                return;
            }

            sourcesLabel.style.display = 'block';
            const cards = sources.map(r => {
                const scoreClass = r.similarity >= 0.8 ? 'score-high' : r.similarity >= 0.5 ? 'score-mid' : 'score-low';
                const pct = (r.similarity * 100).toFixed(0);

                return `
                    <div class="result-card">
                        <div class="result-header">
                            <span class="result-tool">${r.tool_name}</span>
                            <span class="result-score ${scoreClass}">${pct}% match</span>
                        </div>
                        <div class="result-action">${r.action_name}</div>
                        <div class="result-desc">${truncate(r.description, 200)}</div>
                        <div class="result-meta">
                            <span class="meta-tag">${r.transport.toUpperCase()}</span>
                            ${r.status === 'no_mcp' ? '<span class="meta-tag no-mcp">No MCP</span>' : '<span class="meta-tag has-mcp">MCP Ready</span>'}
                            ${r.base_url ? `<span class="meta-tag">${shortenUrl(r.base_url)}</span>` : ''}
                        </div>
                    </div>
                `;
            }).join('');

            results.innerHTML = cards;
        }

        function truncate(str, max) {
            if (!str) return '';
            return str.length > max ? str.slice(0, max) + '...' : str;
        }

        function shortenUrl(url) {
            try {
                const u = new URL(url);
                return u.hostname;
            } catch {
                return url.slice(0, 40);
            }
        }

        async function loadStats() {
            try {
                const [toolsRes, capsRes] = await Promise.all([
                    fetch(`${API}/v1/tools`),
                    fetch(`${API}/v1/capabilities`)
                ]);
                if (toolsRes.ok) {
                    const tools = await toolsRes.json();
                    document.getElementById('statTools').textContent = tools.length.toLocaleString();
                    // Estimate actions (avg ~3 per tool)
                    document.getElementById('statActions').textContent = (tools.length * 3).toLocaleString();
                }
                if (capsRes.ok) {
                    const caps = await capsRes.json();
                    document.getElementById('statCategories').textContent = caps.length;
                }
            } catch {
                // API not running, leave defaults
            }
        }
    </script>
</body>
</html>

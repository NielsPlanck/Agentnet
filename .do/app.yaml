# DigitalOcean App Platform — AgentNet
# Deploy: doctl apps create --spec .do/app.yaml
# Or connect GitHub repo in DO dashboard and it auto-detects this file.

name: agentnet

region: nyc

services:
  - name: agentnet-api
    dockerfile_path: Dockerfile
    source_dir: /
    http_port: 8000

    instance_size_slug: basic-xs  # $5/mo — 512 MB RAM, 1 vCPU
    instance_count: 1

    health_check:
      http_path: /health
      initial_delay_seconds: 15
      period_seconds: 30
      timeout_seconds: 5
      success_threshold: 1
      failure_threshold: 3

    # Environment variables — set these in DO dashboard or via doctl
    envs:
      - key: AGENTNET_OPENAI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: AGENTNET_GEMINI_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: AGENTNET_TAVILY_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: AGENTNET_DATABASE_URL
        scope: RUN_TIME
        value: "sqlite+aiosqlite:////data/agentnet.db"
      - key: AGENTNET_GOOGLE_CLIENT_ID
        scope: RUN_TIME
        type: SECRET
      - key: AGENTNET_GOOGLE_CLIENT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: AGENTNET_GOOGLE_REDIRECT_URI
        scope: RUN_TIME
        value: "https://YOUR_DOMAIN/v1/oauth/google/callback"
      - key: AGENTNET_GOOGLE_AUTH_REDIRECT_URI
        scope: RUN_TIME
        value: "https://YOUR_DOMAIN/v1/auth/google/callback"
      - key: AGENTNET_OAUTH_ENCRYPTION_KEY
        scope: RUN_TIME
        type: SECRET
      - key: AGENTNET_SESSION_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: AGENTNET_JWT_SECRET
        scope: RUN_TIME
        type: SECRET
      - key: AGENTNET_ADMIN_EMAIL
        scope: RUN_TIME
        value: "joelenginov@gmail.com"
      - key: AGENTNET_ADMIN_PASSWORD
        scope: RUN_TIME
        type: SECRET
      - key: AGENTNET_FRONTEND_URL
        scope: RUN_TIME
        value: "https://YOUR_DOMAIN"

    # Persistent disk for SQLite database
    volumes:
      - name: agentnet-data
        mount_path: /data
        size_gb: 1
        type: NFS
